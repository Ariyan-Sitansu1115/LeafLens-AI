<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LeafLens – Login</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <style>
      body {
        margin: 0;
      }
      .login-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 2rem;
        background-image: url('/login-photo');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .login-panel {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 0;
        width: 100%;
      }
      .login-card {
        width: 100%;
        max-width: 520px;
        background: transparent !important;
        border: 1px solid rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(2px);
      }
      .login-photo {
        width: 100%;
        height: 100vh;
        object-fit: cover;
      }
      .role-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .role-tab {
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        padding: 0.6rem 0.8rem;
        cursor: pointer;
      }
      .role-tab.active {
        background: rgba(0, 200, 83, 0.2);
        border-color: rgba(0, 200, 83, 0.8);
      }
      @media (max-width: 980px) {
        .login-shell {
          justify-content: center;
          padding: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-shell">
      <section class="login-panel">
        <div class="card login-card">
          <div class="card-header">
            <h1 class="h1">LeafLens Login</h1>
            <p class="muted">Login first to access dashboard features.</p>
          </div>

          {% if error %}
          <div class="alert" role="alert">{{ error }}</div>
          {% endif %}

          <form id="login-form" method="post" action="/login" class="form" autocomplete="off">
            <input type="hidden" name="role" id="role-input" value="user" />

            <div class="role-tabs" role="tablist" aria-label="Login role">
              <button class="role-tab active" id="user-tab" type="button">User Login</button>
              <button class="role-tab" id="admin-tab" type="button">Admin Login</button>
            </div>

            <div class="row">
              <label class="label" for="username">Username</label>
              <input id="username" class="input" type="text" name="username" placeholder="Enter username" required />
            </div>

            <div class="row" id="email-row">
              <label class="label" for="email">Email</label>
              <input id="email" class="input" type="email" name="email" placeholder="Enter email" required />
            </div>

            <div class="row hidden" id="password-row">
              <label class="label" for="password">Password</label>
              <input id="password" class="input" type="password" name="password" placeholder="Enter admin password" />
            </div>

            <div class="actions">
              <button class="btn btn-primary" type="submit">Login</button>
            </div>
          </form>
        </div>
      </section>

    </div>

    <script>
      const userTab = document.getElementById('user-tab');
      const adminTab = document.getElementById('admin-tab');
      const roleInput = document.getElementById('role-input');
      const emailRow = document.getElementById('email-row');
      const passwordRow = document.getElementById('password-row');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');

      function switchRole(role) {
        const isAdmin = role === 'admin';
        roleInput.value = role;
        userTab.classList.toggle('active', !isAdmin);
        adminTab.classList.toggle('active', isAdmin);
        emailRow.classList.toggle('hidden', isAdmin);
        passwordRow.classList.toggle('hidden', !isAdmin);
        emailInput.required = !isAdmin;
        passwordInput.required = isAdmin;
      }

      userTab.addEventListener('click', () => switchRole('user'));
      adminTab.addEventListener('click', () => switchRole('admin'));
    </script>
  </body>
</html>
